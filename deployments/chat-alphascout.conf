# --- HTTPS vhost ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat-alphascout.leanflag.net;

    ssl_certificate     /etc/letsencrypt/live/leanflag.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leanflag.net/privkey.pem;

    # Per-host logs
    access_log /usr/local/openresty/nginx/logs/chat-alphascout.access.log;
    error_log  /usr/local/openresty/nginx/logs/chat-alphascout.error.log;

    # Server-scoped realip (POST_READ). NEVER put these at http level —
    # this box fronts ~200 vhosts and global scope would rewrite $remote_addr for all.
    # When ALLOW_CIDRS is set, stale CF ranges fail closed: edge IPs won't match.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Optional allow/deny gate (ACCESS phase; sees true client IP after realip).
    # Empty ALLOW_CIDRS → omit entirely (rely on AUTH_MODE). Populated → allow …; deny all;
    # Bare directives at server level — house convention (frp-server.conf:110).

    # oauth2-proxy (listens 127.0.0.1:4180 on the OpenResty box)
    # Pattern from others/leanflag-openwebui.conf
    location /oauth2/ {
        proxy_pass       http://127.0.0.1:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    location = /oauth2/auth {
        proxy_pass       http://127.0.0.1:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Length "";
        proxy_pass_request_body off;
    }
    location / {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in;

        auth_request_set $auth_user $upstream_http_x_auth_request_user;
        auth_request_set $auth_email $upstream_http_x_auth_request_email;
        proxy_set_header X-User  $auth_user;
        proxy_set_header X-Email $auth_email;
        proxy_pass http://mt_chat_alphascout;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade (openchamber needs these; leanflag-openwebui.conf pattern)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
