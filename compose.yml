services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_TAG:-main}
    container_name: mini-tunnel-open-webui
    ports:
      - "127.0.0.1:${OPENWEBUI_PORT:-8080}:8080"
    environment:
      - WEBUI_AUTH=true
      - WEBUI_SECRET_KEY=${OPENWEBUI_SECRET_KEY:-}
    volumes:
      - open-webui-data:/app/backend/data
    restart: unless-stopped

volumes:
  open-webui-data:
